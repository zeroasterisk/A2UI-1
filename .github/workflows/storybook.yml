name: Deploy Storybook to GitHub Pages

on:
  push:
    branches: [feat/coverage-matrix]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build web_core
        working-directory: renderers/web_core
        run: |
          npm install --include=dev
          npm run build

      - name: Build lit renderer
        working-directory: renderers/lit
        run: |
          npm install --include=dev
          npm run build

      - name: Build Storybook
        working-directory: conformance-storybook
        run: |
          npm install --include=dev
          npm run build-storybook

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: conformance-storybook/storybook-static

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
